    <style>
      .container{
        margin-top: 180px;
      }
      .slider {
        height: 100px;
        width: 100%;
        overflow: hidden;
        position: relative;
        margin: auto;
        background: white;
	      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, .125);
      }
      .slider::before,
      .slider::after {
        background: linear-gradient(to right, white 0%, rgba(255, 255, 255, 0) 100%);
        content: "";
        height: 100px;
        position: absolute;
        width: 200px;
        z-index: 2;
      }
      .slider::after {
        right: 0;
        top: 0;
        transform: rotateZ(180deg);
      }
      .slider::before {
        left: 0;
        top: 0;
      }
      .slider .slider-track {
        display: flex;
        width: calc(250px * 15);
        /* animation: scroll 5s linear infinite; */

        animation: scroll 40s linear infinite;
      }
      .slider .slider-track .slide {
        /* display: flex;
        flex-shrink: 0;
        gap: 6rem;
        height: 100px; */

        height: 100px;
		width: 250px;
        /* animation: scroll 6s linear infinite; */
      }
      /* @keyframes scroll {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-100%);
        }
      } */
      /* Animation */
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(calc(-250px * 3))}
      }
    </style>
  </head>
