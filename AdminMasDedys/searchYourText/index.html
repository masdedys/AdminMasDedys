<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search your text | masdedys.github.io</title>
    <link rel="shortcut icon" href="../../assets/img/logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
    <!-- Bootstrap icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
      .highlight {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row d-flex justify-content-center align-items-center" style="height: 85vh;">
        <div class="col-md-6">
          <h2 class="text-center">Search Your Text</h2>
          <fieldset action="" class="my-3">
            <input type="text" class="form-control my-3" id="searchInput" placeholder="search" />
            <button class="btn btn-primary float-end" id="searchBtn">Search</button>
          </fieldset>
          <div id="content">Everyone can be a programmer, no matter what their background.</div>
        </div>
      </div>
    </div>
    
    <!-- copyright start -->
      <div class="copyright container-fluid">
            <div class="copyright-item container">
                <div class="row">
                    <div class="col-md text-dark">
                        <small>&copy;2026&nbsp;<a href="https://masdedys.github.io/">masdedys.github.io</a>, All Rights Reserved</small>
                    </div>
                </div>
            </div>
      </div>
    <!-- copyright end -->
    <script>
      function highlight(element, string, search, originalString) {
        if (search.length > 0) {
          let regex = new RegExp(search, "g");
          newString = string.replace(regex, "<span class='highlight'>" + search + "</span>");
          element.innerHTML = newString;
        } else {
          element.innerHTML = originalString;
        }
      }
      const content = document.getElementById("content");
      const searchInput = document.getElementById("searchInput");
      const searchBtn = document.getElementById("searchBtn");

      let originalContent = content.innerText;

      searchBtn.addEventListener("click", function () {
        highlight(content, content.innerText, searchInput.value, originalContent);
      });
    </script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

  </body>
</html>
