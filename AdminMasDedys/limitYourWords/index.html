<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Limit Your Words | masdedys.github.io</title>
    <link rel="shortcut icon" href="../../assets/img/logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row d-flex justify-content-center align-items-center" style="height: 85vh;">
        <div class="col-md-6">
          <h2 class="text-center">Limit Your Words</h2>
          <!-- <form action="" method="post"> -->
            <input type="text" class="form-control" name="karaktertersisa" id="" onkeyup="karaktertersisa(this,'info', 5);"> 
            <p class="m-3 text-center"><span id="info" class="fw-bold">5</span> kata tersisa</p>
          <!-- </form> -->
        </div>
      </div>
    </div>
    <!-- copyright start -->
      <div class="copyright container-fluid">
            <div class="copyright-item container">
                <div class="row">
                    <div class="col-md text-dark">
                        <small>&copy;2026&nbsp;<a href="https://masdedys.github.io/">masdedys.github.io</a>, All Rights Reserved</small>
                    </div>
                </div>
            </div>
      </div>
    <!-- copyright end -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function karaktertersisa(input, info, batas){
            let infoField = document.getElementById(info);
            let spacecount = (input.value.split(" ").length);
            if(spacecount <= batas){
                infoField.innerText=batas-spacecount;
            }
        }
    </script>
  </body>
</html>
