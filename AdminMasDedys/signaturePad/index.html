<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature pad | masdedys.github.io</title>
    <link rel="shortcut icon" href="../../assets/img/logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
    <!-- Bootstrap icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        canvas {
            background-color: #f9f9f9;
            border: 1px solid #000;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row d-flex justify-content-center align-items-center" style="height: 85vh;">
            <div class="col-md-6 text-center">
                <h2>Signature Pad</h2>
                    <div class="row">
                        <div class="col-md">
                            <canvas id="signature-pad" class="my-3"></canvas>
                            <div class="buttons">
                                <button class="btn btn-primary" id="clear">Clear</button>
                                <button class="btn btn-primary" id="save">Done</button>
                            </div>
                        </div>
                    </div>
                    <div class="row mt-3 text-center signature-pad-form">
                        <div class="col-md-6"></div>
                    </div>
            </div>
        </div>
    </div>
    <!-- copyright start -->
      <div class="copyright container-fluid">
            <div class="copyright-item container">
                <div class="row">
                    <div class="col-md text-dark">
                        <small>&copy;2026&nbsp;<a href="https://masdedys.github.io/">masdedys.github.io</a>, All Rights Reserved</small>
                    </div>
                </div>
            </div>
      </div>
    <!-- copyright end -->

    <script>
        const form = document.querySelector(".signature-pad-form");
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // Logika menggambar dengan mouse/touch
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => {
            drawing = false;
            ctx.beginPath();
        });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!drawing) return;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';
            ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
        }

        // Fitur Clear
        document.getElementById('clear').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
        // Fitur Save
        document.getElementById('save').addEventListener('click', () => {
            const dataURL = canvas.toDataURL('image/png');
            const image = document.createElement("img");
            image.src = dataURL;
            image.height = canvas.height;
            image.width = canvas.width;
            image.style.display = "block";
            form.appendChild(image);

            const link = document.createElement('a');   
            link.href = dataURL;
            link.download = 'signature.png';
            link.textContent = "Download Signature";
            form.appendChild(link);
            clearPad();
        });
        const clearPad = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
      };
    </script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

</body>
</html>
