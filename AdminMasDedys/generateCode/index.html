  <body oncontextmenu="return false">
    <div class="container">
      <div class="row d-flex justify-content-center align-items-center" style="height: 85vh;">
        <div class="col-md-6 text-center">
          <h2 class="text-center mb-5">Generate Code</h2>
          <button class="btn btn-primary" onclick="displayRandomPassword(8)">Generate Password</button>
          <p id="password" class="mt-3"></p>
        </div>
      </div>
    </div>

    <!-- copyright end -->
     <script>
      function generateRandomPassword(length) {
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890";
        let password = "";
        for (let i = 0; i < length; i++) {
          const randomIndex = Math.floor(Math.random() * charset.length);
          password += charset.charAt(randomIndex);
        }
        return password;
      }

      function displayRandomPassword(length) {
        const password = generateRandomPassword(length);
        document.getElementById("password").textContent = password;
      }

      // const randomPassword = generateRandomPassword(8);
      // console.log(randomPassword);
      // document.getElementById("password").textContent = randomPassword;
    </script>
