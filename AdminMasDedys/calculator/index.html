<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator | masdedys.github.io</title>
    <link rel="shortcut icon" href="../../assets/img/logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row d-flex justify-content-center align-items-center" style="height: 85vh;">
        <div class="col-md-6">
          <h2 class="text-center">Calculator</h2>
          <form action="#" method="post">
            <input type="text" name="kalkulator" id="kalkulator" placeholder="Example: 3*4" class="form-control" />
            <h1 class="text-center m-5"  id="hasil"></h1>
        </form>
        </div>
      </div>
    </div>
    <!-- copyright start -->
      <div class="copyright container-fluid">
            <div class="copyright-item container">
                <div class="row">
                    <div class="col-md text-dark">
                        <small>&copy;2026&nbsp;<a href="https://masdedys.github.io/">masdedys.github.io</a>, All Rights Reserved</small>
                    </div>
                </div>
            </div>
      </div>
    <!-- copyright end -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="dropify-master/dist/js/dropify.min.js"></script>
    <script>
      let kalkulator=document.querySelector('#kalkulator');
        let hasil=document.querySelector('#hasil');
        kalkulator.addEventListener("keyup",function(e){
            if(kalkulator.value){
                hasil.innerHTML=eval(kalkulator.value);
            }else{
                hasil.innerHTML;
            }
        });
    </script>
  </body>
</html>
