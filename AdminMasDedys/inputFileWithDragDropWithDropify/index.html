<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input file wih drag and drop | masdedys.github.io</title>
    <link rel="shortcut icon" href="../../assets/img/logo.png" />
    <!-- https://github.com/JeremyFagis/dropify -->
    <link rel="stylesheet" href="dropify-master/dist/css/dropify.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row d-flex justify-content-center align-items-center" style="height: 85vh;">
        <div class="col-md-6">
          <h2 class="text-center">Input File with Drag and Drop</h2>
          <form action="#" method="post">
            <input type="file" class="dropify form-control" data-default-file="Masukkan file kamu" />
          </form>
        </div>
      </div>
    </div>
    <!-- copyright start -->
      <div class="copyright container-fluid">
            <div class="copyright-item container">
                <div class="row">
                    <div class="col-md text-dark">
                        <small>&copy;2026&nbsp;<a href="https://masdedys.github.io/">masdedys.github.io</a>, All Rights Reserved</small>
                    </div>
                </div>
            </div>
      </div>
    <!-- copyright end -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="dropify-master/dist/js/dropify.min.js"></script>
    <script>
      $(document).ready(function () {
        $(".dropify").dropify();
      });
    </script>
  </body>
</html>
