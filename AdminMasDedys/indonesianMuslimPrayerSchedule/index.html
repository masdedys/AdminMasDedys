<!doctype html>
<html lang="en">
  <!--begin::Head-->
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Indonesian muslim prayer schedule | masdedys.github.io</title>
    <link rel="shortcut icon" href="../../assets/img/logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <style>
        body{
            background-color: #F5F5F5;
        }
        .card{
            margin-top: 1vh;
            padding: 3vh; 
            background: #FFFFFF;
            border: 1px solid #F5F5F5;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow:  23px 23px 45px #8cbcdc,
             -23px -23px 45px #8cbcdc;
        }
        .header{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input{
            border: none;
            outline: none;
            color: #0c0c0c;
            padding: 0.5rem 2rem;
            border-radius: 5px;
            background: transparent;
            border: 1px solid #8cbcdc;
            backdrop-filter: blur(8px);
        }
        input:hover{
            border: none;
            outline: none;
            color: #0c0c0c;
            padding: 0.5rem 2rem;
            border-radius: 5px;
            background: white;
            border: 1px solid #8cbcdc;
        }
        input::placeholder{
            color: grey;
        }
        input:hover::placeholder{
            color: #0c0c0c;
        }
        .search{
            position: relative;
        }
        .search i{
            position: absolute;
            left: 10px;
            top: 15px;
            font-size: 15px;
            color: grey;
        }
        .search i:hover{
            position: absolute;
            left: 10px;
            top: 15px;
            font-size: 15px;
            color: #0c0c0c;
        }
        .body{
            text-align: center;
        }
        .city{
            font-size: 1.5rem;
            color: #2E2E2E;
        }
        .prov{
            font-size: 14px;
            color: #2E2E2E;
        }
        .datetime{
            font-size: 16px;
            color: #2E2E2E;
        }
        .icon img{
            width: 80px;
            margin-top: 10px;
        }
        .info{
            /* display: grid;
            grid-template-columns: repeat(2,1fr);*/
            grid-gap: 1rem; 
            border: 2px solid #8cbcdc;
            border-radius: 20px;
            /* margin-top: 0.5rem; */
        }
        .table{
            margin-top: 2rem;
            background: transparent;
            border: 2px solid #8cbcdc;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            padding: 0.2rem;
            color: #0c0c0c;
        }
        .footer{
            display: flex;
            justify-content: center;
            margin-top: 1rem;
            color: #2E2E2E;
        }
        .footer small a, caption a{
            color: #2E2E2E;
            text-decoration: none;
        }
        .footer small a:hover{
            color: #8cbcdc;
        }
        @media (min-width: 768px) {
        .modal-dialog {
            width: 100%; 
            margin: 30px auto;
        }}
    </style>
  </head>
  <!--end::Head-->
  <!--begin::Body-->
  <body>
    <div class="container">
      <div class="row d-flex justify-content-center align-items-center" style="height: 75vh;">
        <div class="card text-center col-md-6">
            <div class="card-header">
                <div class="header">
                    <form action="" class="search">
                        <input type="text" name="kota" id="myInput" class="searchForm" placeholder="Cari di kota / kabupaten"/>
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </form>
                </div>
            </div>
            <div class="card-body body">
                <div class="icon">
                    <img src="../../assets/img/sholat.jpeg" class="img-fluid" alt="" srcset="">
                </div>
                <h2 class="city"></h2>
                <div class="prov"></div>
                <div class="datetime"></div>
                <div class="row info">
                    <div class="col-md">
                        <table class="table table-striped">
                            <caption><a href="#" data-bs-toggle="modal" data-bs-target="#exampleModal">Catatan *</a></caption>
                            <thead>
                                <tr>
                                    <th scope="col">Waktu</th>
                                    <th scope="col">Jam</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Imsak</td>
                                    <td id="imsak" class="imsak"></td>
                                </tr>
                                <tr>
                                    <td>Subuh</td>
                                    <td id="subuh"></td>
                                </tr>
                                <tr>
                                    <td>Terbit</td>
                                    <td id="terbit"></td>
                                </tr>
                                <tr>
                                    <td>Dhuha</td>
                                    <td id="dhuha"></td>
                                    </tr>
                                <tr>
                                    <td>Dzuhur</td>
                                    <td id="dzuhur"></td>
                                    </tr>
                                <tr>
                                    <td>Ashar</td>
                                    <td id="ashar"></td>
                                    </tr>
                                <tr>
                                    <td>Maghrib</td>
                                    <td id="maghrib"></td>
                                    </tr>
                                <tr>
                                    <td>Isya</td>
                                    <td id="isya"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="card-footer footer">
                <small>&copy;2026 <a href="https://masdedys.github.io/">masdedys.github.io</a>, All Rights Reserved</small>
            </div>
        </div>
       </div>
       <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel"></h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>
                    Aplikasi ini saya buat dengan mengambil data dari <br>
                    <span id="desc"></span>
                    Update terakhir: <span id="lastUpdate"></span><br>
                    Sumber: <span id="source"></span>
                </p>
            </div>
            <!-- <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div> -->
            </div>
        </div>
        </div>
    </div>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

    <script>
            // for modal            
        const note = `https://api.myquran.com/v3/sholat`;
        fetch(note)
        .then(res=>res.json())
        .then(data=>{
        console.log(data);
            document.getElementsByClassName('modal-title')[0].innerHTML = data.data.name;
            document.getElementById('desc').innerHTML = data.data.desc;
            document.getElementById('lastUpdate').innerHTML = data.data.last_update;
            document.getElementById('source').innerHTML = data.data.source;
    })
        
        document.querySelector(".search").addEventListener('submit',e=>{
            const inputvalue = document.getElementById('myInput');
            e.preventDefault(); 
            if (!inputvalue.value) return;
            input=inputvalue.value;
            getPrayerSchedule();
            inputvalue.value = '';
        });
        function getPrayerScheduleDefault(){
            input = 'Jakarta';
            getPrayerSchedule();
        }
        function getPrayerSchedule(){   
            //const input = 'Jakarta';      
            const urlKota = `https://api.myquran.com/v3/sholat/kabkota/cari/${input}`;
            const date = new Date();
            let day = date.getDate();
            let month = String(date.getMonth() + 1).padStart(2, '0');
            let year = date.getFullYear();
            let today = `${year}-${month}-${day}`;
            console.log(today);
            //const today = Object.keys(new Date().toISOString().split('T')[0]);
            fetch(urlKota)
            .then(res=>res.json())
            .then(data=>{
                //console.log(data);
                const kota = data.data[0].id;
                const urlWaktuSholat = `https://api.myquran.com/v3/sholat/jadwal/${kota}/today?tz=Asia%2FJakarta`;
                fetch(urlWaktuSholat)
                .then(res=>res.json())
                .then(data=>{
                    console.log(data);
                    document.getElementsByClassName('city')[0].innerHTML = data.data.kabko;
                    document.getElementsByClassName('prov')[0].innerHTML = data.data.prov;
                    document.getElementsByClassName('datetime')[0].innerHTML = data.data.jadwal[`${today}`].tanggal;
                    document.getElementById('imsak').innerHTML = data.data.jadwal[`${today}`].imsak;
                    document.getElementById('subuh').innerHTML = data.data.jadwal[today].subuh;
                    document.getElementById('terbit').innerHTML = data.data.jadwal[today].terbit;
                    document.getElementById('dhuha').innerHTML = data.data.jadwal[today].dhuha;
                    document.getElementById('dzuhur').innerHTML = data.data.jadwal[today].dzuhur;
                    document.getElementById('ashar').innerHTML = data.data.jadwal[today].ashar;
                    document.getElementById('maghrib').innerHTML = data.data.jadwal[today].maghrib;
                    document.getElementById('isya').innerHTML = data.data.jadwal[today].isya;
                })
            })
        }
        document.body.addEventListener('load',getPrayerScheduleDefault())
    </script>
  </body>
  <!--end::Body-->
</html>
