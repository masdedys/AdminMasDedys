<!doctype html>
<html lang="en">
  <!--begin::Head-->
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Weather Map | masdedys.github.io</title>
    <link rel="shortcut icon" href="../../assets/img/logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
    <!-- Bootstrap icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <style>
        body{
            background-image: url(../../assets/img/awan.jpg);
            background-size: cover;
            color: #1e1e1e;
            /* display: flex;
            align-items: center;
            justify-content: center;
            margin: 0; */
        }
        .card{
            margin-top: 1vh;
            padding: 4.5vh; 
            background: transparent;
            border: 1px solid white;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow:  23px 23px 45px #2540ac,
             -23px -23px 45px #3156e8;
        }
        .weather_header{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input{
            border: none;
            outline: none;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 5px;
            background: transparent;
            border: 1px solid white;
            backdrop-filter: blur(8px);
        }
        input:hover{
            border: none;
            outline: none;
            color: #1e1e1e;
            padding: 0.5rem 2rem;
            border-radius: 5px;
            background: white;
            border: 1px solid #1e1e1e;
        }
        input::placeholder{
            color: white;
        }
        input:hover::placeholder{
            color: #1e1e1e;
        }
        .weather_search{
            position: relative;
        }
        .weather_search i{
            position: absolute;
            left: 10px;
            top: 15px;
            font-size: 15px;
            color: white;
        }
        .weather_search i:hover{
            position: absolute;
            left: 10px;
            top: 15px;
            font-size: 15px;
            color: #1e1e1e;
        }
        .weather_units{
            font-size: 1.5rem;
        }
        .weather_units span:first-child{
            margin-right: 0.5rem;
        }
        .weather_body{
            text-align: center;
            margin-top: 2rem;
        }
        .weather_city{
            font-size: 1.5rem;
            color: white;
        }
        .weather_datetime{
            /* margin-bottom: 0rem; */
            font-size: 16px;
            color: white;
        }
        .weather_forecast{
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }
        .weather_forecast p{
            color: #fff;
            margin-top: 0.3rem;
            padding: 0.2rem 1rem;
            border: 1px solid white;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .weather_icon img{
            width: 50px;
        }
        .weather_temperature{
            font-size: 1.5rem;
        }
        .weather_minmax{
            display: flex;
            justify-content: center;
        }
        .weather_minmax p{
            font-size: 14px;
            /* margin: 0.2rem; */
        }
        .weather_info{
            display: grid;
            grid-template-columns: repeat(2,1fr);
            grid-gap: 1rem;
            margin-top: 0.5rem;
        }
        .weather_card{
            display: flex;
            align-items: center;
            background: transparent;
            border: 1px solid #1e1e1e;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            padding: 0.3rem;
            border-radius: 10px;
            color: #1e1e1e;
        }
        .weather_card i{
            font-size: 1.5rem;
            margin-right: 1rem;
            padding-left: 0.5rem;
        }
        .weather_card p{
            font-size: 14px;
            padding-left: 0.5rem;
        }
        .weather_footer{
            display: flex;
            justify-content: center;
            margin-top: 1rem;
            color: white;
        }
        .weather_footer small a{
            color: white;
            text-decoration: none;
        }
        .weather_footer small a:hover{
            color: #1e1e1e;
            text-decoration: none;
        }
        @media(max-width:936px){
            .container{
                width: 90%;
            }
            .weather_header{
                flex-direction: column;
            }
            .weather_units{
                margin-top: 1rem;
            }
        }
        @media(max-width:400px){
            .weather_info{
                grid-template-columns: none;
            }
        }
    </style>
  </head>
  <!--end::Head-->
  <!--begin::Body-->
  <body>
    <div class="container">
      <div class="row d-flex justify-content-center align-items-center" style="height: 50vh;">
        <div class="card col-md-5">
          <!-- <h2 class="text-center text-white">Weather Map</h2> -->
          <div class="row">
            <div class="col-md">
                <div class="weather_header">
                    <form action="" class="weather_search">
                        <input type="text" name="kota" id="" placeholder="Search for a city..." class="weather_searchform" />
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </form>
                <div class="weather_units">
                    <span class="weather_unit_celcius" role="button"></span>
                    <span class="weather_unit_farenheit" role="button"></span>
                </div>
                </div>
                <div class="weather_body mt-2">
                    <h2 class="weather_city"></h2>
                    <div class="weather_datetime"></div>
                    <div class="weather_forecast"></div>
                    <div class="weather_icon"></div>
                    <p class="weather_temperature"></p>
                    <div class="weather_minmax">
                        <p>Min: 12&#176</p>
                        <p>Max: 16&#176</p>
                    </div>
                </div>
                <div class="weather_info">
                    <div class="weather_card">
                        <i class="fa-solid fa-temperature-full"></i>
                        <div>
                            <p><b>Real Feel</b></p>
                            <p class="weather_realfeel">18&#176</p>
                        </div>
                    </div>
                    <div class="weather_card">
                        <i class="fa-solid fa-droplet"></i>
                        <div>
                            <p><b>Humidity</b></p>
                            <p class="weather_humidity"></p>
                        </div>
                    </div>
                    <div class="weather_card">
                        <i class="fa-solid fa-wind"></i>
                        <div>
                            <p><b>Wind</b></p>
                            <p class="weather_wind">18&#176</p>
                        </div>
                    </div>
                    <div class="weather_card">
                        <i class="fa-solid fa-gauge-high"></i>
                        <div>
                            <p><b>Pressure</b></p>
                            <p class="weather_pressure">18&#176</p>
                        </div>
                    </div>
                </div>
                <div class="weather_footer">
                    <small>&copy;2026 <a href="https://masdedys.github.io/">masdedys.github.io</a>, All Rights Reserved</small>
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

    <script>
        const units='metric';
        const kota = 'Jakarta';
        const city=document.querySelector(".weather_city");
        const datetime=document.querySelector(".weather_datetime");
        const weather_forecast=document.querySelector(".weather_forecast");
        const weather_temperature=document.querySelector(".weather_temperature");
        const weather_icon=document.querySelector(".weather_icon");
        const weather_minmax=document.querySelector(".weather_minmax");
        const weather_realfeel=document.querySelector(".weather_realfeel");
        const weather_humidity=document.querySelector(".weather_humidity");
        const weather_wind=document.querySelector(".weather_wind");
        const weather_pressure=document.querySelector(".weather_pressure");
        const weather_unit_farenheit=document.querySelector(".weather_unit_farenheit");

        document.querySelector(".weather_search").addEventListener('submit',e=>{
            const search =document.querySelector(".weather_searchform");
            e.preventDefault();
            // currCity=search.value;
            const kota= search.value;
            //console.log("Form submitted!");
            console.log("Search value:", kota);
            // getweather();
            const apiKey = '6e93b3d15872f914c6929fed9ea71e9a';
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${kota}&appid=${apiKey}&units=metric`;
            
            fetch(url)
            .then(res=>res.json())
            .then(data=>{
                console.log(data);
                city.innerHTML = `${data.name}, ${convertCountryCode(data.sys.country)}`;
                const localDate = new Date((data.dt + data.timezone) * 1000);
                //console.log(localDate.toUTCString()); 
                datetime.innerHTML=localDate.toUTCString();

                weather_forecast.innerHTML=`<p>${data.weather[0].main}</p>`;
                weather_temperature.innerHTML=`${data.main.temp.toFixed()}&#176;C`;
                weather_icon.innerHTML=`<img src="http://openweathermap.org/img/w/${data.weather[0].icon}.png">`;
                weather_minmax.innerHTML=`<p>Min: ${data.main.temp_min.toFixed()}&#176;C </p><p>&nbsp;Max: ${data.main.temp_max.toFixed()}&#176;C</p>`;   
                weather_realfeel.innerHTML=`${data.main.feels_like.toFixed()}&#176;C`;
                weather_humidity.innerHTML=`${data.main.humidity} %`;
                weather_wind.innerHTML=`${data.wind.speed} ${units==="imperial" ? "mph": "m/s"}`;
                weather_pressure.innerHTML=`${data.main.pressure}hPa`;

            })
            search.value=""
        })
        document.querySelector(".weather_unit_celcius").addEventListener('click',()=>{
            if(units !== "metric"){
                units="metric"
                getweather()
            }
        })
        document.querySelector(".weather_unit_farenheit").addEventListener('click',()=>{
            if(units !== "imperial"){
                units="imperial";
                getweather();
            }
        })
        function convertTimeStamp(timestamp, timezone){
            const convertTimezone=timezone/3600;
            const date=new Date(timestamp=1000);

            const options={
                weekday:"long",
                day:"numeric",
                month:"long",
                year:"numeric",
                hour:"numeric",
                minutes:"numeric",
                timeZone:'Etc/GMTS{convertTimezone >= 0 ? "-" : "+"}${Math.abs(convertTimezone)}',
                hour12:true,
            }
            return date.toLocaleDateString("en-US",options)
        }
        function convertCountryCode(country){
            let regionNames=new Intl.DisplayNames(["en"],{type:"region"});
            return regionNames.of(country)
        }

        function getweather(){
            const apiKey = '6e93b3d15872f914c6929fed9ea71e9a';
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${kota}&appid=${apiKey}&units=${units}`;
            
            fetch(url)
            .then(res=>res.json())
            .then(data=>{
                console.log(data);
                city.innerHTML = `${data.name}, ${convertCountryCode(data.sys.country)}`;
                const localDate = new Date((data.dt + data.timezone) * 1000);
                //console.log(localDate.toUTCString()); 
                datetime.innerHTML=localDate.toUTCString();

                weather_forecast.innerHTML=`<p>${data.weather[0].main}</p>`;
                weather_temperature.innerHTML=`${data.main.temp.toFixed()}&#176; C`;
                weather_icon.innerHTML=`<img src="http://openweathermap.org/img/w/${data.weather[0].icon}.png">`;
                weather_minmax.innerHTML=`<p>Min: ${data.main.temp_min.toFixed()}&#176; C</p><p>&nbsp;Max: ${data.main.temp_max.toFixed()}&#176; C</p>`;   
                weather_realfeel.innerHTML=`${data.main.feels_like.toFixed()}&#176; C`;
                weather_humidity.innerHTML=`${data.main.humidity} %`;
                weather_wind.innerHTML=`${data.wind.speed} ${units==="imperial" ? "mph": "m/s"}`;
                weather_pressure.innerHTML=`${data.main.pressure} hPa`;

            })
        }
        document.body.addEventListener('load',getweather())
    </script>
  </body>
  <!--end::Body-->
</html>
